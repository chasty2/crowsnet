---
# Minimal smoke checks for the common role. Idempotency is verified separately
# by molecule's built-in `idempotence` step, not here.
- name: Verify
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert sshd is running
      ansible.builtin.assert:
        that:
          - "'ssh.service' in ansible_facts.services or 'sshd.service' in ansible_facts.services"
        fail_msg: "sshd service is not present"

    - name: Assert the chasty2 admin user exists
      ansible.builtin.getent:
        database: passwd
        key: chasty2

    - name: Read chasty2 .bashrc
      ansible.builtin.slurp:
        src: /home/chasty2/.bashrc
      register: common_chasty2_bashrc

    - name: Assert fzf bash integration is configured
      ansible.builtin.assert:
        that:
          - "'key-bindings.bash' in (common_chasty2_bashrc.content | b64decode)"
        fail_msg: "fzf bash integration missing from chasty2 .bashrc"
